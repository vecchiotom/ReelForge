services:
  postgres:
    container_name: reelforge-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-reelforge}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-reelforge}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      reelforge:
        aliases:
          - postgres

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    ports:
      - "${MINIO_API_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - miniodata:/data
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - reelforge

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set myminio http://minio:9000 $${MINIO_ACCESS_KEY:-minioadmin} $${MINIO_SECRET_KEY:-minioadmin};
      mc mb --ignore-existing myminio/$${MINIO_BUCKET:-reelforge};
      exit 0;
      "
    environment:
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin}
      MINIO_BUCKET: ${MINIO_BUCKET:-reelforge}
    networks:
      - reelforge

  rabbitmq:
    image: rabbitmq:3-management-alpine
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    volumes:
      - rabbitmqdata:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - reelforge

  inference:
    build:
      context: ./inference
      dockerfile: src/ReelForge.Inference.Api/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-reelforge};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Issuer: ${JWT_ISSUER:-reelforge-api}
      Jwt__Audience: ${JWT_AUDIENCE:-reelforge-inference}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-}
      MinIO__Endpoint: http://minio:9000
      MinIO__AccessKey: ${MINIO_ACCESS_KEY:-minioadmin}
      MinIO__SecretKey: ${MINIO_SECRET_KEY:-minioadmin}
      MinIO__BucketName: ${MINIO_BUCKET:-reelforge}
      AzureOpenAI__Endpoint: ${AZURE_OPENAI_ENDPOINT:-}
      AzureOpenAI__ApiKey: ${AZURE_OPENAI_API_KEY:-}
      AzureOpenAI__DeploymentName: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-mini}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      rabbitmq:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://localhost:8080/api/v1/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - reelforge
      

  workflow-engine:
    build:
      context: ./inference
      dockerfile: src/ReelForge.WorkflowEngine/Dockerfile
    restart: unless-stopped
    environment:
      ASPNETCORE_ENVIRONMENT: ${ASPNETCORE_ENVIRONMENT:-Development}
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Host=postgres;Port=5432;Database=${POSTGRES_DB:-reelforge};Username=${POSTGRES_USER:-postgres};Password=${POSTGRES_PASSWORD:-postgres}
      Jwt__Issuer: ${JWT_ISSUER:-reelforge-api}
      Jwt__Audience: ${JWT_AUDIENCE:-reelforge-inference}
      Jwt__SigningKey: ${JWT_SIGNING_KEY:-}
      MinIO__Endpoint: http://minio:9000
      MinIO__AccessKey: ${MINIO_ACCESS_KEY:-minioadmin}
      MinIO__SecretKey: ${MINIO_SECRET_KEY:-minioadmin}
      MinIO__BucketName: ${MINIO_BUCKET:-reelforge}
      AzureOpenAI__Endpoint: ${AZURE_OPENAI_ENDPOINT:-}
      AzureOpenAI__ApiKey: ${AZURE_OPENAI_API_KEY:-}
      AzureOpenAI__DeploymentName: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o-mini}
      RabbitMQ__Host: rabbitmq
      RabbitMQ__Username: ${RABBITMQ_USER:-guest}
      RabbitMQ__Password: ${RABBITMQ_PASSWORD:-guest}
      Sandbox__BaseUrl: http://sandbox-executor:8080
      WorkflowEngine__MaxConcurrency: ${WORKFLOW_MAX_CONCURRENCY:-4}
    depends_on:
      postgres:
        condition: service_healthy
      inference:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://localhost:8080/api/v1/workflow-engine/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - reelforge

  sandbox-executor:
    build:
      context: ./sandbox
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.org}
    image: reelforge-sandbox-executor:local
    restart: unless-stopped
    environment:
      PORT: 8080
      SANDBOX_IMAGE: reelforge-sandbox-executor:local
      SANDBOX_ROOT: /var/lib/reelforge/sandboxes
      SANDBOX_NETWORK: sandbox-net
      SANDBOX_TTL: ${SANDBOX_TTL:-1h}
      SANDBOX_EXEC_TIMEOUT: ${SANDBOX_EXEC_TIMEOUT:-5m}
      SANDBOX_MEMORY_LIMIT: ${SANDBOX_MEMORY_LIMIT:-2g}
      SANDBOX_CPU_LIMIT: ${SANDBOX_CPU_LIMIT:-2}
      SANDBOX_PIDS_LIMIT: ${SANDBOX_PIDS_LIMIT:-256}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/reelforge/sandboxes:/var/lib/reelforge/sandboxes
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - sandbox-net
      - reelforge

  go-api:
    build:
      context: ./api
      dockerfile: Dockerfile
      args:
        GOPROXY: ${GOPROXY:-https://proxy.golang.org,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.org}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-reelforge}?sslmode=disable
      INFERENCE_URL: http://inference:8080
      JWT_SIGNING_KEY: ${JWT_SIGNING_KEY:-}
      JWT_ISSUER: ${JWT_ISSUER:-reelforge-api}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-reelforge-inference}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USERNAME: ${SMTP_USERNAME:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@reelforge.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_USER: ${RABBITMQ_USER:-guest}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-guest}
    depends_on:
      minio-init:
        condition: service_completed_successfully
      inference:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - reelforge

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
      # Switch between 'development' (Turbopack hot reload) and 'production' (precompiled standalone)
      target: ${WEB_BUILD_TARGET:-development}
    # ── Volume Mounts ──────────────────────────────────────
    # REQUIRED for development mode (hot reload)
    # MUST BE REMOVED/COMMENTED for production mode
    # ───────────────────────────────────────────────────────
    # volumes:
    #   - ./web:/app
    #   - /app/node_modules
    #   - /app/.next
    # ───────────────────────────────────────────────────────
    environment:
      - NODE_ENV=${WEB_NODE_ENV:-development}
      - NODE_OPTIONS=--inspect=0.0.0.0:9229
      - PORT=3000
    ports:
      - "3000:3000"
      - "9229:9229"
    restart: unless-stopped
    depends_on:
      inference:
        condition: service_healthy
      go-api:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO/dev/null http://127.0.0.1:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    networks:
      - reelforge

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "${APP_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/auth.js:/etc/nginx/auth.js:ro
    depends_on:
      web:
        condition: service_healthy
      sandbox-executor:
        condition: service_healthy
    networks:
      - reelforge

volumes:
  pgdata:
  miniodata:
  rabbitmqdata:

networks:
  reelforge:
  sandbox-net:
    driver: bridge
