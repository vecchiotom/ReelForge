load_module modules/ngx_http_js_module.so;

events {}

http {
    upstream go_api {
        server go-api:8080;
    }
    upstream inference_api {
        server inference:8080;
    }
    upstream workflow_engine {
        server workflow-engine:8080;
    }
    upstream sandbox_executor {
        server sandbox-executor:8080;
    }
    upstream web_app {
        server web:3000;
    }

    js_import auth from /etc/nginx/auth.js;
    js_set $auth_header auth.getAuthHeader;

    server {
        listen 80;
        server_name _;
        client_max_body_size 100M;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /api/v1/auth/token {
            proxy_pass http://go_api;
        }

        location = /api/auth/logout {
            if ($request_method != POST) {
                return 405;
            }
            js_content auth.handleLogout;
        }

        location /api/v1/auth/ {
            proxy_set_header Authorization $auth_header;
            proxy_pass http://go_api;
        }

        location /api/v1/admin/ {
            proxy_set_header Authorization $auth_header;
            proxy_pass http://go_api;
        }

        location /api/v1/workflows/ {
            proxy_set_header Authorization $auth_header;
            proxy_pass http://go_api;
        }

        location = /health {
            proxy_pass http://go_api;
        }

        location /api/v1/workflow-engine/ {
            proxy_set_header Authorization $auth_header;
            proxy_pass http://workflow_engine;
        }

        location /api/v1/sandboxes {
            proxy_pass http://sandbox_executor;
        }

        location /api/v1/ {
            proxy_set_header Authorization $auth_header;
            proxy_pass http://inference_api;
        }

        location / {
            proxy_pass http://web_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
