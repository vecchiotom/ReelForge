load_module modules/ngx_http_js_module.so;

events {}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;

    js_import auth from /etc/nginx/auth.js;
    js_set $auth_header auth.getAuthHeader;

    server {
        listen 80;
        server_name _;
        client_max_body_size 100M;

        set $go_api http://go-api:8080;
        set $inference_api http://inference:8080;
        set $workflow_engine http://workflow-engine:8080;
        set $sandbox_executor http://sandbox-executor:8080;
        set $web_app http://web:3000;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location = /api/v1/auth/token {
            proxy_pass $go_api;
        }

        location = /api/auth/logout {
            if ($request_method != POST) {
                return 405;
            }
            js_content auth.handleLogout;
        }

        location /api/v1/auth/ {
            proxy_set_header Authorization $auth_header;
            proxy_pass $go_api;
        }

        location /api/v1/admin/ {
            proxy_set_header Authorization $auth_header;
            proxy_pass $go_api;
        }

        location /api/v1/workflows/ {
            proxy_set_header Authorization $auth_header;
            proxy_pass $go_api;
        }

        # stop requests are now handled by the Inference API; the earlier
        # regex hack routing them to the Go API is no longer needed.
        location ~ ^/api/v1/projects/[^/]+/workflows/[^/]+/executions/[^/]+/stop$ {
            proxy_set_header Authorization $auth_header;
            proxy_pass $inference_api;
        }

        location = /health {
            proxy_pass $go_api;
        }

        location /api/v1/workflow-engine/ {
            proxy_set_header Authorization $auth_header;
            proxy_pass $workflow_engine;
        }

        location /api/v1/sandboxes {
            proxy_pass $sandbox_executor;
        }

        location /api/v1/ {
            proxy_set_header Authorization $auth_header;
            proxy_pass $inference_api;
        }

        location / {
            proxy_pass $web_app;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
